server {
    listen 80;
    server_name fantasystore.com.br www.fantasystore.com.br;
    
    # Redirecionar HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name fantasystore.com.br www.fantasystore.com.br;

    # Certificados SSL (ajuste os caminhos conforme sua configuração)
    ssl_certificate /etc/nginx/ssl/fantasystore.com.br.crt;
    ssl_certificate_key /etc/nginx/ssl/fantasystore.com.br.key;
    
    # Configurações SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 4h;
    ssl_session_tickets off;
    
    # HSTS - Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Configurações padrão de segurança
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
    
    # Limites e timeouts
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Proxy para o serviço Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }
    
    # Cache para arquivos estáticos
    location /_next/static/ {
        proxy_pass http://localhost:3000/_next/static/;
        proxy_cache_valid 200 304 30d;
        proxy_cache_bypass $http_cache_control;
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 30d;
    }
    
    # Cache para imagens
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 304 7d;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }
    
    # Ignorar requisições de arquivos que não existem
    location ~ /\. {
        deny all;
    }
    
    # Logs
    access_log /var/log/nginx/fantasystore.access.log;
    error_log /var/log/nginx/fantasystore.error.log;
} 